<!-- CALCULADORAS -->
<div class="w-full max-w-3xl mt-10 grid md:grid-cols-2 gap-6">
    
    <!-- Calibre Mínimo -->
    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
        <h2 class="text-xl font-bold mb-4 text-blue-400">🧮 Calibre Mínimo</h2>
        <div class="flex flex-col gap-3">
            <input id="input-amperes" type="number" placeholder="Amperes" class="bg-slate-900 p-3 rounded-lg border border-slate-700 text-white">
            <select id="select-temp" class="bg-slate-900 p-3 rounded-lg border border-slate-700 text-white">
                <option value="60">60°C</option>
                <option value="75">75°C</option>
                <option value="90">90°C</option>
            </select>
            <button onclick="calcularCalibre()" class="bg-blue-600 hover:bg-blue-500 py-3 rounded-lg font-bold">Calcular</button>
        </div>
        <div id="res-calibre" class="mt-4 text-center font-bold text-xl text-emerald-400"></div>
    </div>

    <!-- Siemens Selector -->
    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
        <h2 class="text-xl font-bold mb-4 text-orange-400">⚡ Siemens: Selector</h2>
        <div class="flex flex-col gap-3">
            <input id="in-carga" type="number" placeholder="Carga (A)" class="bg-slate-900 p-3 rounded-lg border border-slate-700 text-white">
            <input id="in-max" type="number" placeholder="In Sensor (A)" class="bg-slate-900 p-3 rounded-lg border border-slate-700 text-white">
            <button onclick="calcularSiemens()" class="bg-orange-600 hover:bg-orange-500 py-3 rounded-lg font-bold">Calcular Ajuste</button>
        </div>
        <div id="res-siemens" class="mt-4 text-center font-bold text-lg"></div>
    </div>
</div>
